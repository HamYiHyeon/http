<!DOCTYPE html> 
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>inventory</title>

    <style>
        * {
            margin: 0;
            padding: 0;
        }
        #zoom {
            display: none;
            position: absolute;
            top: 0;
            left: 35vw;

        }
        #zo {
            display: block;
            position: relative;
            background: rgba(255, 255, 255, 0.5);
            top: 15vh;
            width: 30vw;
            height: 30vw;
            cursor: pointer;
            margin: auto;
            z-index: 10;
        }

        #start {
            margin: 0;
            height: 100vh;
            background-image: url('bgStart.png'); /* 배경 이미지 설정 */
            background-size: cover; /* 배경 이미지를 화면 크기에 맞게 조정 */
            background-position: center;
        }
        /* 배경 이미지의 일부분을 버튼으로 만들기 */
        .btnBackground {
            position: fixed; /* 화면의 고정된 위치에 버튼 배치 */
            top: 60vh; /* 화면 높이에 비례하여 버튼을 중앙에서 더 아래로 배치 */
            left: 50%; /* 화면 가로 중앙에 배치 */
            transform: translateX(-50%); /* 수평으로 정확히 가운데 정렬 */
            width: 18vw; /* 화면 너비에 비례하여 버튼의 너비 설정 */
            height: 16vh; /* 화면 높이에 비례하여 버튼의 높이 설정 */
            background-image: url('btnStart.png'); /* 버튼 배경 이미지 */
            background-size: cover; /* 이미지 크기를 버튼에 맞게 조정 */
            background-position: center; /* 이미지의 중앙을 버튼에 맞게 배치 */
            cursor: pointer; /* 클릭할 수 있도록 커서 모양 변경 */
            border-radius: 10px; /* 버튼의 둥근 모서리 */
        }

        /* 버튼에 마우스를 올렸을 때 */
        .btnBackground:hover {
            opacity: 0.8; /* 마우스를 올리면 투명도 변경 */
        }

        /* 버튼의 클릭 시 효과 */
        .btnBackground:active {
            transform: translateX(-50%) scale(0.95); /* 클릭 시 살짝 눌리는 효과 */
        }


        #screen1 {
            height: 100vh;
            width: 100vw;
            background: url("기숙사방.png");
            background-repeat: no-repeat;   
            background-size: cover;
        }
        #screen2 {
            height: 100vh;
            width: 100vw;
            background: url("복도.png");
            background-repeat: no-repeat;   
            background-size: cover;
        }
        #screen3 {
            height: 100vh;
            width: 100vw;
            background: url("세탁실.png");
            background-repeat: no-repeat;   
            background-size: cover;
        }
        #screen4 {
            height: 100vh;
            width: 100vw;
            background: url("지하실문.png");
            background-repeat: no-repeat;
            background-size: cover;
        }
        #screen5 {
            height: 100vh;
            width: 100vw;
            background: url("지하계단.png");
            background-repeat: no-repeat;
            background-size: cover;
        }
        #screen6 {
            height: 100vh;
            width: 100vw;
            background: url("지하실.png");
            background-repeat: no-repeat;
            background-size: cover;
        }
        #itembox {
            width: 6vw;
            height: 100vh;
            float: left;
            background: rgba(100, 100, 100, 0.7);
            display: none;
        }
        .object {
            width: 94vw;
            height: 100vh;
            position: absolute;
            cursor: pointer;
            z-index: 1;
            opacity: 0.3;
        }
        .item{
            cursor: pointer;
        }
        #drawerKey{
            clip-path: polygon(80.7vw 80.3vh, 81.7vw 74vh, 77.8vw 71vh, 76.8vw 76.3vh);
        }
        #closet{
            clip-path: polygon(23.5vw 36vh, 38vw 36vh, 38vw 72vh, 28vw 80vh, 25vw 76vh);
        }
        #drawer{
            clip-path: polygon(50vw 47.7vh, 55.5vw 49vh, 55.5vw 55.5vh, 50vw 54vh);
        }
        #door1{
            clip-path: polygon(0 23vh, 30vh 25vh, 36vh 83vh, 0 97vh);
        }
        #door2{           
         clip-path: polygon(100vw 20vh, 80vw 23vh, 75vw 95vh, 100vw 100vh);
        }
        #room101{
            width: 24.6vh;
            height: 48vh;
            left: 17.5vw;
            top: 29vh;
        }
        #LaundryRoom{
            width: 24.6vh;
            height: 48vh;
            left: 70.5vw;
            top: 29vh;
        }
        #board{
            clip-path: polygon(45vw 24vh, 65vw 19vh, 64vw 47vh, 45vw 43vh);
        }
        #secretPath{
            clip-path: ellipse(80px 68px at 16% 61%);
        }
        #basementDoor{
            clip-path: polygon(33vw 35vh, 55vw 35vh, 55vw 72vh, 33vw 72vh);
        }
        #laundryRoomPassword{
            clip-path: polygon(56vw 41vh, 58vw 40vh, 58vw 48vh, 56vw 48vh);
        }
        #toBasement{
            clip-path: polygon(37vw 35vh, 51vw 35vh, 53vw 60vh, 35vw 60vh);
        }
                /* btnOpenRoom 모달*/
        #btnRoomOpenModal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(0, 0, 0, 0.7);
            padding: 20px;
            border-radius: 10px;
            color: white;
            z-index: 10;
        }

        #RoomAlertMessage {
            display: none;
            margin-top: 10px;
        }

                /* btnOpenRoom 이미지 버튼 */
        #btnOpenRoom {
            position: absolute;  /* 절대 위치로 배치 */
            top: 40vh;  /* 화면의 상단에서 40% 위치 */
            left: 25%;  
            transform: translateX(-50%); /* 수평 중앙 정렬 */
            width: 3vw;  /* 버튼 크기 설정 */
            height: auto;
            background: none;
            border: none;
            cursor: pointer;
        }

        #btnOpenRoom img {
            width: 100%;  /* 버튼의 크기에 맞춰 이미지 크기 조정 */
            height: 100%;
            object-fit: contain;  /* 이미지 비율 유지 */
        }
    </style>

    <script>
        let door1 = false;  
        let imgSrc = {
            메모1: "memo1.png",
            메모2: "memo2.png",
            메모3: "memo3.png",
            메모4: "memo4.png",
            피옷1: 'blood_shirts_1.png',
            피옷2: 'blood_shirts_2.png',
            피옷3: 'blood_shirts_3.png',
            피옷4: 'blood_shirts_4.png',
            빤옷1: 'hint_shirts_1.png',
            빤옷2: 'hint_shirts_2.png',
            빤옷3: 'hint_shirts_3.png',
            빤옷4: 'hint_shirts_4.png',
            열쇠: '그림3.png',
            커서: "그림4.svg",
            유령: "그림5.svg",
            자물쇠: "자물쇠_잠금.svg",
            열림: "자물쇠_열림.svg"
            };
        function ItemInsert(obj) {
            console.log(obj);
            let bool = true;
            let newItem = document.createElement("img");
            if(obj.id == 'board'){
                newItem.src = imgSrc['메모2'];
            }
            else {newItem.src = imgSrc[obj.alt];}
            newItem.style.height = "6vw";
            newItem.style.width = "6vw";
            newItem.className="item"

            if(typeof obj.getAttribute === 'function') {
                if(obj.hasAttribute('key')) {
                        newItem.setAttribute('key', obj.getAttribute('key'));
                        console.log(newItem);
                }
            }
            else{
                if('key' in obj){
                    newItem.setAttribute('key', obj.key);
                }
                console.log(newItem);
            }

            if(obj.id != "zoomitem" && obj.id != 'board') newItem.onclick = function() {alert(obj.alt);};
            else newItem.onclick = function() {
                zo.src = newItem.src;
                zoom.style.display = "block";
            }
            document.getElementById("itembox").appendChild(newItem);
            if(obj.src !== undefined) obj.style.display = 'none'
        }
        function Unlock(lock) {
            let unlock = false
            let items = document.getElementsByClassName("item");
            for (let i = 0; i < items.length; i++) {
                if (items[i].hasAttribute('key') && items[i].getAttribute('key') === lock.getAttribute('need')) {
                    console.log(items[i].getAttribute('key'));
                    console.log(lock.getAttribute('need'));
                    unlock = true
                    items[i].remove();
                    break;
                }
            }
            if(unlock) {
                if(lock.id == "drawer"){
                    ItemInsert({id: 'zoomitem', alt: '메모1'});
                    ItemInsert({alt: '열쇠', key: 'closet'});
                }
                if(lock.id == "closet"){
                    ItemInsert({id: 'zoomitem', alt: '피옷1'});
                    ItemInsert({alt: '피옷2'});
                }
                lock.style.display = 'none';
                lock.alt = '열림';
            } 
            zo.src = imgSrc[lock.alt]; 
            zoom.style.display = "block";
        }
        function Nonedisplay() {
            zoom.style.display = "none";
        }
        function ShowImg(imageSrc) {
            const modal = document.getElementById('modal');
            const modalImg = document.getElementById('modalImg');
            const overlay = document.getElementById('overlay');
            modalImg.src = imageSrc;
            modal.style.display = 'block';
            modal.style.display = 'block';
        }
        function hideModal() {
            const modal = document.getElementById('modal');
            const overlay = document.getElementById('overlay');
            modal.style.display = 'none';
            overlay.style.display = 'none';
        }
        function changeBackground(){
            document.getElementById('start').style.display = 'none';
            document.getElementById('screen1').style.display = 'block';
            document.getElementById('itembox').style.display = 'block';
                        // btnOpenRoom 버튼 생성
            let btnOpenRoom = document.createElement('button');
            btnOpenRoom.id = 'btnOpenRoom';

            // 이미지 추가
            let img = document.createElement('img');
            img.src = 'RoomLocker.png'; // 이미지 경로
            btnOpenRoom.appendChild(img);

            // btnOpenRoom 버튼을 body에 추가
            screen1.appendChild(btnOpenRoom);

            // btnOpenRoom 클릭 시 모달 띄우기
            btnOpenRoom.addEventListener('click', function() {
                document.getElementById('btnRoomOpenModal').style.display = 'block';
            });
            btnRoomClose.addEventListener('click', function() {
                document.getElementById('btnRoomOpenModal').style.display = 'none';
            });
            btnRoomCheck.addEventListener('click', function() {
                const password = document.getElementById('RoomPasswordInput').value;
                if (password === "7152") {  // 암호 여기서 수정
                  alert("열렸습니다.");
                  door1 = true;
                  document.getElementById('btnRoomOpenModal').style.display = 'none';
                } else {
                    document.getElementById('RoomAlertMessage').style.display = 'block';
                    document.getElementById('RoomAlertMessage').innerText = "잘못된 암호입니다!";
                    }
            });
        }
        function enterScreen2(door) {
            if(door1){
                document.getElementById('screen1').style.display = 'none';
                document.getElementById('screen2').style.display = 'block';
            }
            else {
                zo.src = imgSrc['자물쇠']; 
            zoom.style.display = "block";
            }
        }
    </script>
</head>
<body>
    <article id="start">
        <div class="btnBackground" onclick="changeBackground()">
        </div>
    </article>
    <ol id="itembox"></ol>
    <div id='zoom' style="text-align: center;">
        <img id='zo' src="" onclick="Nonedisplay()">
    </div>
    <article id="screen1" style="margin-left: auto; margin-right: auto; display: none;">
            <!-- RoomLocker 모달 -->
        <div id="btnRoomOpenModal">
            <p>암호를 입력하세요:</p>
            <input type="text" id="RoomPasswordInput" placeholder="암호 입력" />
            <button id="btnRoomCheck">확인</button>
            <button id="btnRoomClose">닫기</button>
            <p id="RoomAlertMessage"></p>
        </div>
        <div id="div1">
            <img class="object" id="drawerKey" src="흰색.png"
            alt="열쇠" key='drawer' onclick="ItemInsert(this)">
            <img class="object" id="closet" src="흰색.png"
            alt="자물쇠" need = "closet"onclick="Unlock(this)">
            <img class="object" id="drawer" src="흰색.png"
            alt="자물쇠" need = "drawer" onclick="Unlock(this)">
            <img class="object" id="door1" src="흰색.png"
            alt="문" need=true onclick='enterScreen2(this)'>
        </div>
    </article>
    <article id="screen2" style="margin-left: auto; margin-right: auto; display: none;">
        <div id="div2">
            <img class="object" id="room101" src="흰색.png"
            alt="문" onclick="document.getElementById('screen2').style.display = 'none'; document.getElementById('screen1').style.display = 'block';">
            <img class="object" id="LaundryRoom" src="흰색.png"
            alt="문" onclick="document.getElementById('screen2').style.display = 'none'; document.getElementById('screen3').style.display = 'block';">
        </div>
    </article>
    <article id="screen3" style="margin-left: auto; margin-right: auto; display: none;">
        <div id="div3">
            <img class="object" id="door2" src="흰색.png"
            alt="문" onclick="document.getElementById('screen3').style.display = 'none'; document.getElementById('screen2').style.display = 'block';">
            <img class="object" id="board" src="흰색.png"
            alt="게시판" onclick="ItemInsert(this)">
            <div id='btnLaundary'>
                <img class="object" id="secretPath" src="흰색.png"
                    alt="문" onclick="document.getElementById('screen3').style.display = 'none'; document.getElementById('screen4').style.display = 'block';">
            </div>
            <div class="overlay" id="overlay" onclick="hideModal()"></div>
            <div class="modal" id="modal">
                <img id="modalImg" src="" onclick="ItemInsert(this); hideModal();">
            </div>
        </div>
    </article>
    <article id="screen4" style="margin-left: auto; margin-right: auto; display:none;">
        <div id="div1">
            <img class="object" id="laundryRoomPassword" src="흰색.png"
            alt="자물쇠" onclick="Unlock(this)">
            <img class="object" id="basementDoor" src="흰색.png"
            alt="문" onclick="document.getElementById('screen4').style.display = 'none'; document.getElementById('screen5').style.display = 'block';">
        </div>        
    </article>
    <article id="screen5" style="margin-left: auto; margin-right: auto; display:none;">
        <div id="div1">
            <img class="object" id="toBasement" src="흰색.png"
            alt="문" onclick="document.getElementById('screen5').style.display = 'none'; document.getElementById('screen6').style.display = 'block';">
        </div>        
    </article>
    <article id="screen6" style="margin-left: auto; margin-right: auto; display:none;">
        <div>
            
        </div>        
    </article>
</body>
</html>
